<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Assignments - CampusIQ</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="sidebar">
      <div class="brand">CampusIQ</div>
      <nav>
        <a href="student-dashboard.html" class="nav-item">
          <span class="nav-icon">🏠</span>
          Home
        </a>
        <a href="student-profile.html" class="nav-item">
          <span class="nav-icon">👤</span>
          My Profile
        </a>
        <a href="student-assignments.html" class="nav-item active">
          <span class="nav-icon">📝</span>
          Assignments
        </a>
        <a href="student-marks.html" class="nav-item">
          <span class="nav-icon">💯</span>
          Marks
        </a>
        <a href="student-attendance.html" class="nav-item">
          <span class="nav-icon">✅</span>
          Attendance
        </a>
        <a href="student-timetable.html" class="nav-item">
          <span class="nav-icon">🗓️</span>
          Timetable
        </a>
        <a href="student-resources.html" class="nav-item">
          <span class="nav-icon">📚</span>
          Resources
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <div class="user-profile">
          <div class="avatar">🎓</div>
          <div class="user-info">
            <div class="user-name" id="current-user">Student User</div>
            <div class="user-role" id="current-role">Undergraduate</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="search-wrap">
          <input id="global-search" type="text" placeholder="Search assignments..." />
          <button class="search-btn">🔍</button>
        </div>
        <div class="user-area">
          <button class="notification-btn">🔔</button>
          <button class="logout-btn" onclick="window.handleLogout()">Logout</button>
        </div>
      </header>

      <section class="content-area">
        <div id="assignmentsAlert"></div>

        <div class="page-header">
          <h1>My Assignments</h1>
          <p class="page-subtitle">View and track your assignments</p>
        </div>

        <div class="action-bar">
          <div class="filter-group">
            <input type="text" id="searchInput" class="form-input" placeholder="Search assignments...">
            <select id="subjectFilter" class="form-select">
              <option value="">All My Subjects</option>
              <!-- Options populated by JS -->
            </select>
            <select id="statusFilter" class="form-select">
              <option value="">All Statuses</option>
              <option value="upcoming">Upcoming</option>
              <option value="active">Active</option>
              <option value="overdue">Overdue</option>
            </select>
          </div>
        </div>

        <div class="dashboard-card full-width" style="margin-top: 32px;">
          <h3>All Assignments <span class="badge badge-info" id="totalAssignmentsCount">-- assignments</span></h3>
          <div class="table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Subject</th>
                  <th>Due Date</th>
                  <th>Max Marks</th>
                  <th>Uploaded By</th>
                  <th>Uploaded On</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="assignmentsTableBody">
                <!-- Assignments data populated by JS -->
              </tbody>
            </table>
          </div>
          <div class="pagination" id="pagination">
            <!-- Pagination buttons populated by JS -->
          </div>
        </div>

      </section>
    </main>
  </div>

  <!-- Core Scripts -->
  <script src="../js/database.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/student-assignments.js"></script>

  <style>
    .action-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding: 20px;
      background: var(--bg-secondary);
      border-radius: 16px;
      border: 2px solid var(--border-color);
    }

    .filter-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .form-input, .form-select {
      padding: 12px 16px;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .form-input:focus, .form-select:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      outline: none;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-primary);
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid var(--border-color);
      box-shadow: var(--shadow);
    }

    .data-table th,\
    .data-table td {
      padding: 20px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .data-table th {
      background: var(--bg-secondary);
      font-weight: 700;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 13px;
    }

    .data-table td {
      font-weight: 500;
      color: var(--text-primary);
    }

    .data-table tr:last-child td {
      border-bottom: none;
    }

    .data-table .btn-sm {
      padding: 8px 16px;
      font-size: 13px;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .data-table .btn-primary { background: var(--accent-primary); color: white; border: none; }
    .data-table .btn-secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); }
    .data-table .btn-danger { background: var(--accent-danger); color: white; border: none; }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    .pagination button {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 600;
    }

    .pagination button:hover:not(:disabled) {
      background: var(--accent-primary);
      color: white;
      border-color: var(--accent-primary);
    }

    .pagination button.active {
      background: var(--accent-primary);
      color: white;
      border-color: var(--accent-primary);
    }

    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</body>
</html>
