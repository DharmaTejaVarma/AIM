{% extends "base.html" %}

{% block title %}My Timetable - CampusIQ{% endblock %}

{% block content %}
<div id="app" class="app-shell">
    {% set active_page = 'timetable' %}
    {% include 'includes/student_sidebar.html' %}

    <main class="main">
        <header class="topbar">
            <div class="header-title">
                <h2 style="font-size: 1.25rem; font-weight: 600; color: var(--text-primary); margin: 0;">My Timetable
                </h2>
            </div>
            <div class="user-area">
                <button class="notification-btn">🔔</button>
                <a href="{{ url_for('auth.logout') }}" class="logout-btn">Logout</a>
            </div>
        </header>

        <section class="content-area">
            <div class="page-header">
                <h1>Class Timetable</h1>
                <p class="page-subtitle">Your weekly schedule</p>
            </div>

            <div class="dashboard-card full-width">
                <!-- Timetable Grid (matches faculty layout incl. Lunch) -->
                <div class="timetable-card">
                    <div id="timetableContainer" class="timetable-wrapper">
                        <div class="text-center p-5 text-muted">Loading timetable...</div>
                    </div>
                </div>
            </div>

        </section>
    </main>
</div>

<style>
    /* Brighter, higher-contrast grid like faculty view */
    .timetable-card {
        overflow-x: auto;
        padding: 0;
    }

    .timetable-wrapper {
        min-width: 1200px;
        padding: 18px;
    }

    .timetable-grid {
        display: grid;
        /* Day | P1 | P2 | P3 | P4 | Lunch | P5 | P6 | P7 */
        grid-template-columns: 120px repeat(4, 1fr) 64px repeat(3, 1fr);
        gap: 1px;
        background-color: #cbd5e1;
        /* brighter grid lines */
        border: 1px solid #cbd5e1;
        border-radius: 14px;
        overflow: hidden;
    }

    .grid-header {
        background-color: #f1f5f9;
        color: var(--text-primary);
        padding: 14px 10px;
        text-align: center;
        font-weight: 700;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 0.92rem;
        border: 1px solid #cbd5e1;
        /* Ensure header cells have borders */
    }

    .grid-header small {
        font-weight: 600;
        color: #475569;
        font-size: 0.75rem;
        margin-top: 0.25rem;
    }

    .grid-row-header {
        background-color: #f8fafc;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.98rem;
        color: var(--text-primary);
        padding: 12px 8px;
        border: 1px solid #cbd5e1;
        /* Ensure row headers have borders */
    }

    .grid-cell {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 120px;
        position: relative;
        padding: 12px;
        background-color: #ffffff;
        transition: background-color 0.15s ease, box-shadow 0.15s ease;
        border: 1px solid #cbd5e1;
        /* Explicit borders to ensure grid lines are always visible */
    }

    .grid-cell:hover {
        background-color: #f8fafc;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
        z-index: 1;
    }

    .grid-cell.empty {
        background-color: #ffffff;
        color: #94a3b8;
        font-weight: 600;
        border: 1px solid #cbd5e1;
        /* Ensure empty cells also have borders */
    }

    .lunch-break {
        background-color: #e2e8f0;
        color: #475569;
        display: flex;
        justify-content: center;
        align-items: center;
        writing-mode: vertical-rl;
        text-orientation: mixed;
        font-weight: 800;
        letter-spacing: 0.1em;
        font-size: 0.8rem;
        padding: 0;
        text-transform: uppercase;
        user-select: none;
        border: 1px solid #cbd5e1;
        /* Ensure lunch break cell has borders */
    }

    .timetable-cell {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 4px;
    }

    .subject-name {
        font-weight: 700;
        font-size: 0.95rem;
        color: var(--primary-color);
        line-height: 1.2;
    }

    .faculty-name {
        font-size: 0.85rem;
        color: var(--text-secondary);
    }

    .room-info {
        font-size: 0.8rem;
        color: var(--text-muted);
        font-style: italic;
    }
</style>

<!-- Core Scripts -->
<script src="/static/js/database.js"></script>
<script src="/static/js/auth.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const container = document.getElementById('timetableContainer');

        try {
            const today = new Date().toISOString().split('T')[0];
            const response = await fetch("{{ url_for('student.fetch_timetable') }}", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date: today })
            });

            if (response.ok) {
                const data = await response.json();

                if (data.semester_validation && !data.semester_validation.allowed) {
                    container.innerHTML = `<div class="text-center p-5 text-warning">${data.semester_validation.message}</div>`;
                    return;
                }

                renderTimetable(data, container);
            } else {
                container.innerHTML = '<div class="text-center p-5 text-muted">No timetable data available.</div>';
            }
        } catch (e) {
            console.error(e);
            container.innerHTML = '<div class="text-center p-5 text-muted">Check back later for timetable updates.</div>';
        }
    });

    function renderTimetable(data, container) {
        const { days, periods, timetable } = data;
        if (!timetable) return;

        // Day | P1..P4 | Lunch | P5..P7
        const gridCols = `120px repeat(4, 1fr) 64px repeat(3, 1fr)`;

        let html = `
            <div class="timetable-grid" style="grid-template-columns: ${gridCols};">
                <div class="grid-header">Day</div>
                ${periods.slice(0, 4).map(p => `<div class="grid-header">${p.label || ''}<br><small>${p.start}-${p.end}</small></div>`).join('')}
                <div class="grid-header">Lunch<br><small>12:35-13:30</small></div>
                ${periods.slice(4).map(p => `<div class="grid-header">${p.label || ''}<br><small>${p.start}-${p.end}</small></div>`).join('')}

                <div class="lunch-break" style="grid-row: 2 / span ${days.length}; grid-column: 6;">Lunch Break</div>
        `;

        days.forEach((day) => {
            html += `<div class="grid-row-header">${day}</div>`;

            const dayData = timetable[day] || {};
            const skippedIndices = new Set();

            periods.forEach((period, index) => {
                if (skippedIndices.has(index)) return;

                const slot = dayData[period.start];
                let span = 1;

                // Merge consecutive same-entry blocks, but never cross lunch (index 0-3 before lunch)
                if (slot && slot.entries && slot.entries.length > 0) {
                    const entry = slot.entries[0];
                    for (let k = index + 1; k < periods.length; k++) {
                        if (index <= 3 && k > 3) break;

                        const nextPeriod = periods[k];
                        const nextSlot = dayData[nextPeriod.start];
                        if (nextSlot && nextSlot.entries && nextSlot.entries.length > 0) {
                            const nextEntry = nextSlot.entries[0];
                            if (nextEntry.id === entry.id) {
                                span++;
                                skippedIndices.add(k);
                            } else {
                                break;
                            }
                        } else {
                            break;
                        }
                    }
                }

                const gridSpanStyle = span > 1 ? `grid-column: span ${span};` : '';

                if (slot && slot.entries && slot.entries.length > 0) {
                    const entry = slot.entries[0];

                    let statusClass = '';
                    if (entry.status === 'suspended') statusClass = 'text-danger';
                    else if (entry.status === 'altered') statusClass = 'text-info';

                    html += `
                        <div class="grid-cell ${statusClass}" style="${gridSpanStyle}">
                            <div class="timetable-cell">
                                <div class="subject-name">${entry.subject_name}</div>
                                <div class="faculty-name">${entry.faculty_name}</div>
                                <div class="room-info">Rm: ${entry.room || 'N/A'}</div>
                            </div>
                        </div>
                    `;
                } else {
                    html += `<div class="grid-cell empty" style="${gridSpanStyle}">-</div>`;
                }
            });
        });

        html += `</div>`;
        container.innerHTML = html;
    }
</script>
{% endblock %}
